name: Trigger auto deployment for chat-app-web

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/chat-app-web-AutoDeployTrigger-b5623162-ea3b-42d6-9fef-3bad6833ed01.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CHATAPPWEB_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CHATAPPWEB_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CHATAPPWEB_AZURE_SUBSCRIPTION_ID }}


      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile.web
          registryUrl: chatappwebregistry.azurecr.io
          registryUsername: ${{ secrets.CHATAPPWEB_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CHATAPPWEB_REGISTRY_PASSWORD }}
          containerAppName: chat-app-web
          resourceGroup: rg-chat-app
          imageToBuild: chatappwebregistry.azurecr.io/chat-app-web:${{ github.sha }}
          buildArguments: |
            NODE_ENV=production
      


