name: Terraform Foundation

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-foundation.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/terraform-foundation.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: infra
  TF_VAR_FILE: dev.tfvars
  TF_ENV: dev

jobs:
  terraform:
    name: Terraform Validate, Plan, and Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Fmt Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Azure Login (OIDC)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TF_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TF_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TF_AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init (Remote Backend)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=chat-app-${{ env.TF_ENV }}.tfstate"

      - name: Terraform Validate
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -input=false -var-file=${{ env.TF_VAR_FILE }} -out=tfplan
          terraform show -no-color tfplan > tfplan.txt

      - name: Terraform Validate (Fork PR)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -backend=false
          terraform validate

      - name: Upload Plan Artifact
        if: github.event_name == 'pull_request' && (github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev
          path: |
            infra/tfplan
            infra/tfplan.txt

      - name: Add Plan Summary
        if: github.event_name == 'pull_request' && (github.event.pull_request.head.repo.full_name == github.repository)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "## Terraform Plan (dev)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          head -n 200 tfplan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
