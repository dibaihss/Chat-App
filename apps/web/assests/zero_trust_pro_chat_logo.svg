<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="leftBubble" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: var(--color-text-info); stop-opacity: 0.9"/>
      <stop offset="100%" style="stop-color: var(--color-text-info); stop-opacity: 0.7"/>
    </linearGradient>
    <linearGradient id="rightBubble" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: var(--color-text-success); stop-opacity: 0.9"/>
      <stop offset="100%" style="stop-color: var(--color-text-success); stop-opacity: 0.7"/>
    </linearGradient>
  </defs>
  
  <!-- Left chat bubble -->
  <rect x="200" y="120" width="140" height="100" rx="12" fill="url(#leftBubble)" stroke="var(--color-text-info)" stroke-width="2" style="stroke:rgb(128, 170, 221);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 210 220 L 190 240 L 220 220 Z" fill="url(#leftBubble)" stroke="var(--color-text-info)" stroke-width="2" style="stroke:rgb(128, 170, 221);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Right chat bubble -->
  <rect x="340" y="160" width="140" height="100" rx="12" fill="url(#rightBubble)" stroke="var(--color-text-success)" stroke-width="2" style="stroke:rgb(122, 185, 72);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 470 260 L 490 280 L 460 260 Z" fill="url(#rightBubble)" stroke="var(--color-text-success)" stroke-width="2" style="stroke:rgb(122, 185, 72);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Shield in center (overlapping bubbles) -->
  <path d="M 340 140 L 380 160 L 380 210 Q 380 240 340 260 Q 300 240 300 210 L 300 160 Z" fill="var(--color-background-primary)" stroke="var(--color-text-primary)" stroke-width="3" style="fill:rgb(48, 48, 46);stroke:rgb(250, 249, 245);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Lock on shield -->
  <rect x="327" y="195" width="26" height="32" rx="3" fill="var(--color-text-primary)" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 332 195 L 332 185 Q 332 177 340 177 Q 348 177 348 185 L 348 195" fill="none" stroke="var(--color-text-primary)" stroke-width="2.5" stroke-linecap="round" style="fill:none;stroke:rgb(250, 249, 245);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" y="208" r="3.5" fill="var(--color-background-primary)" style="fill:rgb(48, 48, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="338" y="208" width="4" height="10" fill="var(--color-background-primary)" style="fill:rgb(48, 48, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Message lines in bubbles -->
  <line x1="220" y1="145" x2="310" y2="145" stroke="var(--color-background-primary)" stroke-width="3" stroke-linecap="round" opacity="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(48, 48, 46);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="220" y1="165" x2="290" y2="165" stroke="var(--color-background-primary)" stroke-width="3" stroke-linecap="round" opacity="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(48, 48, 46);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="220" y1="185" x2="305" y2="185" stroke="var(--color-background-primary)" stroke-width="3" stroke-linecap="round" opacity="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(48, 48, 46);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <line x1="360" y1="185" x2="450" y2="185" stroke="var(--color-background-primary)" stroke-width="3" stroke-linecap="round" opacity="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(48, 48, 46);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="360" y1="205" x2="430" y2="205" stroke="var(--color-background-primary)" stroke-width="3" stroke-linecap="round" opacity="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(48, 48, 46);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="360" y1="225" x2="445" y2="225" stroke="var(--color-background-primary)" stroke-width="3" stroke-linecap="round" opacity="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(48, 48, 46);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Encryption indicators -->
  <circle cx="250" cy="110" r="8" fill="var(--color-text-info)" opacity="0.4" style="fill:rgb(128, 170, 221);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="275" cy="105" r="6" fill="var(--color-text-info)" opacity="0.3" style="fill:rgb(128, 170, 221);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <circle cx="430" cy="150" r="8" fill="var(--color-text-success)" opacity="0.4" style="fill:rgb(122, 185, 72);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="455" cy="145" r="6" fill="var(--color-text-success)" opacity="0.3" style="fill:rgb(122, 185, 72);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- App name -->
  <text x="340" y="330" text-anchor="middle" font-family="var(--font-sans)" font-size="32" font-weight="500" fill="var(--color-text-primary)" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:32px;font-weight:500;text-anchor:middle;dominant-baseline:auto">Zero Trust Pro</text>
  <text x="340" y="355" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="400" fill="var(--color-text-secondary)" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:14px;font-weight:400;text-anchor:middle;dominant-baseline:auto">End-to-end encrypted chat</text>
</svg>