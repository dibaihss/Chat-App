services:
  chat-api:
    image: ${CHAT_API_IMAGE:-chat-app-api:latest}
    restart: unless-stopped
    ports:
      - "${CHAT_API_PORT:-3001}:3001"
    environment:
      CHAT_API_PORT: 3001
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      AUTH_MODE: ${AUTH_MODE:-entra}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_ISSUER: ${ENTRA_ISSUER:-}
      ENTRA_AUDIENCE: ${ENTRA_AUDIENCE:-}
      ENTRA_JWKS_URI: ${ENTRA_JWKS_URI:-}
      KEY_VAULT_ENABLED: ${KEY_VAULT_ENABLED:-true}
      KEY_VAULT_URI: ${KEY_VAULT_URI:-}
      KEY_VAULT_ALLOW_LOCAL_FALLBACK: ${KEY_VAULT_ALLOW_LOCAL_FALLBACK:-false}
      KEY_VAULT_CACHE_TTL_SECONDS: ${KEY_VAULT_CACHE_TTL_SECONDS:-300}
      KEY_VAULT_REFRESH_INTERVAL_SECONDS: ${KEY_VAULT_REFRESH_INTERVAL_SECONDS:-0}
      KEY_VAULT_SECRET_COSMOS_CONNECTION_STRING: ${KEY_VAULT_SECRET_COSMOS_CONNECTION_STRING:-}
      KEY_VAULT_SECRET_COSMOS_ENDPOINT: ${KEY_VAULT_SECRET_COSMOS_ENDPOINT:-}
      KEY_VAULT_SECRET_COSMOS_KEY: ${KEY_VAULT_SECRET_COSMOS_KEY:-}
      KEY_VAULT_SECRET_ENTRA_TENANT_ID: ${KEY_VAULT_SECRET_ENTRA_TENANT_ID:-}
      KEY_VAULT_SECRET_ENTRA_ISSUER: ${KEY_VAULT_SECRET_ENTRA_ISSUER:-}
      KEY_VAULT_SECRET_ENTRA_AUDIENCE: ${KEY_VAULT_SECRET_ENTRA_AUDIENCE:-}
      KEY_VAULT_SECRET_ENTRA_JWKS_URI: ${KEY_VAULT_SECRET_ENTRA_JWKS_URI:-}
      COSMOS_CONNECTION_STRING: ${COSMOS_CONNECTION_STRING:-}
      COSMOS_ENDPOINT: ${COSMOS_ENDPOINT:-}
      COSMOS_KEY: ${COSMOS_KEY:-}
      COSMOS_DATABASE_ID: ${COSMOS_DATABASE_ID:-chat_app}
      COSMOS_MESSAGES_CONTAINER_ID: ${COSMOS_MESSAGES_CONTAINER_ID:-messages}
      COSMOS_USERS_CONTAINER_ID: ${COSMOS_USERS_CONTAINER_ID:-users}
      COSMOS_ROOMS_CONTAINER_ID: ${COSMOS_ROOMS_CONTAINER_ID:-rooms}
      COSMOS_MEMBERSHIPS_CONTAINER_ID: ${COSMOS_MEMBERSHIPS_CONTAINER_ID:-room_memberships}

  web:
    image: ${WEB_IMAGE:-chat-app-web:latestv1}
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_CHAT_API_URL: ${NEXT_PUBLIC_CHAT_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_ENTRA_CLIENT_ID: ${NEXT_PUBLIC_ENTRA_CLIENT_ID:-}
        NEXT_PUBLIC_ENTRA_TENANT_ID: ${NEXT_PUBLIC_ENTRA_TENANT_ID:-}
        NEXT_PUBLIC_ENTRA_AUTHORITY: ${NEXT_PUBLIC_ENTRA_AUTHORITY:-}
        NEXT_PUBLIC_ENTRA_REDIRECT_URI: ${NEXT_PUBLIC_ENTRA_REDIRECT_URI:-http://localhost:3000}
        NEXT_PUBLIC_CHAT_API_SCOPE: ${NEXT_PUBLIC_CHAT_API_SCOPE:-}
    profiles:
      - build-web
    restart: unless-stopped
    depends_on:
      - chat-api
    ports:
      - "${WEB_PORT:-3000}:3000"
